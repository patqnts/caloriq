name: caloriq
description: A calm, minimal weight & calorie tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # HTTP
  http: ^1.2.0
  
  # Date/Time
  intl: ^0.19.0
  table_calendar: ^3.1.0
  
  # UI
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
